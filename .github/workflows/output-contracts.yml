name: Output Contracts

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-key-tsv-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate key output contracts
        run: python scripts/check_output_contracts.py

